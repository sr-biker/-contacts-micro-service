services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: contacts
      POSTGRES_USER: contacts
      POSTGRES_PASSWORD: contacts
    ports:
      - "5432:5432"
    volumes:
      - contacts-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contacts -d contacts"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: contacts
      DB_USERNAME: contacts
      DB_PASSWORD: contacts
    depends_on:
      db:
        condition: service_healthy

volumes:
  contacts-db-data:

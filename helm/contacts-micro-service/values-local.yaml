replicaCount: 2

image:
  repository: contacts-micro-service-app
  tag: latest
  pullPolicy: IfNotPresent

environment: local
springProfile: local

ingress:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Plain-text creds are fine for the local kind cluster; matches docker-compose.yml in
# contacts-micro-service. Point this at a Postgres reachable from inside kind (e.g. a
# postgres Deployment/Service in the same namespace, or host.docker.internal).
db:
  host: postgres
  port: "5432"
  name: contacts
  username: contacts
  password: contacts

# Keycloak runs in senthil-auth in the same kind cluster (see infra's local/README.md) --
# cross-namespace Service DNS works fine (namespaces aren't a network boundary).
security:
  enabled: true
  issuerUri: http://keycloak.senthil-auth.svc.cluster.local:8080/realms/apps

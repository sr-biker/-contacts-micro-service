replicaCount: 2

image:
  repository: 605448157849.dkr.ecr.us-east-1.amazonaws.com/contacts-micro-service
  tag: 02c7d767
  pullPolicy: IfNotPresent
  # Refreshed periodically by a CronJob (templates/ecr-registry-refresh-cronjob.yaml) --
  # ECR auth tokens expire after ~12h.
  pullSecretName: ecr-registry

environment: prod
springProfile: prod

ingress:
  enabled: true

resources:
  requests:
    cpu: 250m
    memory: 384Mi
  limits:
    cpu: 1000m
    memory: 768Mi

probes:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 15
    periodSeconds: 5
    failureThreshold: 3

# host/port/name are plain (never secret); username/password are fetched at container
# startup (dbSecretFetch below), not via a k8s Secret at all.
db:
  host: infra-prod-rds-postgres.cmx2qymsqgue.us-east-1.rds.amazonaws.com
  port: "5432"
  name: appdb

ecrRefresh:
  enabled: true
  region: us-east-1
  registry: 605448157849.dkr.ecr.us-east-1.amazonaws.com
  secretName: ecr-registry

dbSecretFetch:
  enabled: true
  # Secrets Manager secret name (not ARN) -- matches modules/rds's master_secret_name default
  # in the infra repo, and the node IAM policy scoped to it (db_secret_read).
  secretName: /rds/postgres/credentials
  region: us-east-1

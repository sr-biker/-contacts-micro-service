server:
  port: 8080

spring:
  application:
    name: contacts-micro-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:contacts}
    username: ${DB_USERNAME:contacts}
    password: ${DB_PASSWORD:contacts}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
